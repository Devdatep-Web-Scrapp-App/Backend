name: Keep Alive

on:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render API
        run: curl -f https://socialpulse-api.onrender.com/

      - name: Ping Aiven MySQL
        run: |
          mysql -h ${{ secrets.DB_HOST }} \
                -P ${{ secrets.DB_PORT }} \
                -u ${{ secrets.DB_USER }} \
                -p${{ secrets.DB_PASSWORD }} \
                -e "SELECT 1;" \
                --ssl-mode=REQUIRED