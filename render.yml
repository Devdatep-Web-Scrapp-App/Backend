services:

  # ── FastAPI ────────────────────────────────────────────────────────────────
  - type: web
    name: socialpulse-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: ENCRYPTION_KEY
        sync: false
      - key: CELERY_BROKER_URL
        fromService:
          name: socialpulse-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: socialpulse-redis
          type: redis
          property: connectionString

  # ── Celery Worker ──────────────────────────────────────────────────────────
  - type: worker
    name: socialpulse-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.tasks.celery_app worker --loglevel=info --pool=solo
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: ENCRYPTION_KEY
        sync: false
      - key: CELERY_BROKER_URL
        fromService:
          name: socialpulse-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: socialpulse-redis
          type: redis
          property: connectionString

  # ── Celery Beat ────────────────────────────────────────────────────────────
  - type: worker
    name: socialpulse-beat
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.tasks.celery_app beat --loglevel=info
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: ENCRYPTION_KEY
        sync: false
      - key: CELERY_BROKER_URL
        fromService:
          name: socialpulse-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: socialpulse-redis
          type: redis
          property: connectionString

  # ── Redis ──────────────────────────────────────────────────────────────────
  - type: redis
    name: socialpulse-redis
    plan: free
    ipAllowList: []