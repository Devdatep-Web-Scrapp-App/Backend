version: "3.8"

services:
  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app

  worker:
    build: .
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app
      - chrome_data_ig:/app/chrome_sessions
      - chrome_data_tk:/app/chrome_sessions_tiktok

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  chrome_data_ig:
  chrome_data_tk:
