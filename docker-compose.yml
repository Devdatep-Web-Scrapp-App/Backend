version: "3.8"

services:
  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - TZ=America/Lima
    depends_on:
      - redis
    volumes:
      - .:/app

  worker:
    build: .
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      - TZ=America/Lima
    depends_on:
      - redis
    volumes:
      - .:/app
      - ig_sessions:/app/ig_sessions

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  ig_sessions: